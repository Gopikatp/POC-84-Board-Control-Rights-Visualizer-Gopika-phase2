services:
  backend:
    build:
      context: ./backend
    container_name: board-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: board-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/api